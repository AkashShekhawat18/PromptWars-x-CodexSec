version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: neuroflow-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neuroflow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: neuroflow-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend-core:
    build:
      context: ./backend-core
      dockerfile: Dockerfile
    container_name: neuroflow-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/neuroflow_db?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=5000
    depends_on:
      - db
      - redis

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: neuroflow-ai
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/neuroflow_db?schema=public
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY="" # Empty placeholder for user key
    depends_on:
      - db
      - redis

volumes:
  pgdata:
  redisdata:
